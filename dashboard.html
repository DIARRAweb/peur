import { getDatabase, ref, get, update, push, remove, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js";
const firebaseConfig = {
    apiKey: "AIzaSyBsKMDF-nX-4tM_Hh0JPozZRuY9x9sFmh4",
    authDomain: "securite-53ada.firebaseapp.com",
    databaseURL:"https://securite-53ada-default-rtdb.firebaseio.com/",
    projectId: "securite-53ada",
    storageBucket: "securite-53ada.firebasestorage.app" // ✅ TRÈS IMPORTANT
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getDatabase(app);

// ================= BACKGROUND DYNAMIQUE =================
const video = document.getElementById("bgVideo");
const image = document.getElementById("bgImage");
const toggleAudioBtn = document.getElementById("toggleAudio");

let isMuted = true;
let currentIsVideo = false;

// 🔊 bouton audio
toggleAudioBtn.addEventListener("click", () => {
isMuted = !isMuted;
if(currentIsVideo){
video.muted = isMuted;
}
toggleAudioBtn.textContent = isMuted ? "🔇" : "🔊";
});

// 🔥 fallback
let maliMedia = [
{type:"image", url:"https://images.unsplash.com/photo-1600172454520-134a542d7c97"},
{type:"video", url:"https://cdn.pixabay.com/video/2018/10/09/18675-297657059_large.mp4"}
];

let index = 0;
let currentTimeout;

function switchMedia(){
if (!maliMedia.length) return;

clearTimeout(currentTimeout);

const ad = maliMedia[index];

// 🎬 VIDEO
if (ad.type === "video") {
video.src = ad.url;
video.style.display = "block";
image.style.display = "none";

video.muted = isMuted;
currentIsVideo = true;

video.onloadedmetadata = () => {
video.play().catch(()=>{});
const duration = ad.duration || video.duration || 10;

currentTimeout = setTimeout(() => {
index = (index + 1) % maliMedia.length;
switchMedia();
}, duration * 1000);
};
}

// 🖼 IMAGE
else {
image.src = ad.url;
image.style.display = "block";
video.style.display = "none";

async function getLiveRate(from,to){

if(from === to) return 1;

try{

const res =
await fetch(
`https://open.er-api.com/v6/latest/${from}`
);

if(!res.ok){
return null;
}

const data = await res.json();

if(
data.result === "success" &&
data.rates &&
data.rates[to]
){
return data.rates[to];
}

return null;

}catch(e){

console.log("Erreur API :", e);

return null;
}
}

function formatMoney(a){ return Number(a).toLocaleString("fr-FR"); }

function generateTxID(){
const d = new Date();

const date = d.getFullYear() +
String(d.getMonth()+1).padStart(2,'0') +
String(d.getDate()).padStart(2,'0');

const time =
String(d.getHours()).padStart(2,'0') +
String(d.getMinutes()).padStart(2,'0') +
String(d.getSeconds()).padStart(2,'0');

const random = Math.random().toString(36).substring(2,8).toUpperCase();

return `MLP-${date}-${time}-${random}`;
}

}

let sender=senderSnap.val();
let receiverData=receiverSnap.val();
let treasury = treasurySnap.exists()

: {
national:{
name:"Commission nationale",
rate:0.01,
balance:0
},
international:{
name:"Commission internationale",

balance:0

const senderCountry =

getCountry(receiverPhone).name;

senderCountry === receiverCountry;

receiverPhone.startsWith("+223");

!sameCountry;

treasury.national?.rate || 0;

treasury.international?.rate || 0;

🏛 FONDS SOUTIEN

let startupRate = 0;

if(isMaliSender){

async function processScheduledTransfers(){

const scheduledRef = ref(db,"scheduledTransfers");
const snapshot = await get(scheduledRef);

if(!snapshot.exists()) return;

const transfers = snapshot.val();
const now = Date.now();

for(const [id, tx] of Object.entries(transfers)){

if(tx.executed === true) continue;

if(!tx.scheduledFor) continue;

const scheduledTime = new Date(tx.scheduledFor).getTime();

if(now < scheduledTime) continue;

/* ===== Récupération comptes ===== */

const senderSnap = await get(ref(db,"users/"+tx.from));
const receiverSnap = await get(ref(db,"users/"+tx.to));
const treasurySnap = await get(ref(db,"treasury"));

if(!senderSnap.exists() || !receiverSnap.exists()){
console.log("Compte introuvable");
continue;
}

let sender = senderSnap.val();
let receiver = receiverSnap.val();
let treasury = treasurySnap.exists()
? treasurySnap.val()
: {
national:{
name:"Commission nationale",
rate:0.01,
balance:0
},
international:{
name:"Commission internationale",
rate:0.015,
balance:0
},
startup:{
name:"Fonds soutien digital",
rate:0.005,
balance:0
}
};

/* ===== Vérifications sécurité ===== */

if(sender.frozen || receiver.frozen){
console.log("Compte gelé");
continue;
}

let totalDebit =
tx.amountOriginal + tx.totalFees;

const disponible = sender.solde - (sender.frozenBalance || 0);

if(disponible < totalDebit){
console.log("Solde insuffisant (bloqué)");
continue;
}

/* ===== Débit / Crédit ===== */

sender.solde -= totalDebit;
receiver.solde += tx.amountConverted;
/* =========================
🏦 TRESORERIE PROGRAMMEE
========================= */

/* 🌍 pays */
const senderCountry =
getCountry(tx.from).name;

const receiverCountry =
getCountry(tx.to).name;

/* 🌍 même pays ? */
const sameCountry =
senderCountry === receiverCountry;

/* 🌍 international ? */
const isInternational =
!sameCountry;

/* 🇲🇱 Mali ? */
const isMaliSender =
tx.from.startsWith("+223");

if(isInternational){

const xofRate =
await getLiveRate(
tx.senderCurrency,
"XOF"
);

treasury.international.balance =
Number(treasury.international.balance || 0)
+ Number((tx.serviceFee || 0) * xofRate);

treasury.startup.balance =
Number(treasury.startup.balance || 0)
+ Number((tx.startupFee || 0) * xofRate);

}else{

/* 🇲🇱 Mali */
if(isMaliSender){

treasury.national.balance =
Number(treasury.national.balance || 0)
+ Number(tx.serviceFee || 0);

treasury.startup.balance =
Number(treasury.startup.balance || 0)
+ Number(tx.startupFee || 0);

}

/* 🌍 National étranger */
else{

const xofRate =
await getLiveRate(
tx.senderCurrency,
"XOF"
);

const serviceFeeXOF =
(tx.serviceFee || 0) * xofRate;

treasury.national.balance =
Number(treasury.national.balance || 0)
+ Number(serviceFeeXOF || 0);

}

}

/* ===== Mise à jour comptes ===== */

await update(ref(db,"users/"+tx.from), sender);
await update(ref(db,"users/"+tx.to), receiver);
await update(ref(db,"treasury"), treasury);

/* ===== Historique transaction ===== */

const historyRef = await push(ref(db,"history/"+tx.from),{
from: tx.from,
to: tx.to,
amountOriginal: tx.amountOriginal,
amountConverted: tx.amountConverted,
serviceFee: tx.serviceFee,
startupFee: tx.startupFee,
totalFees: tx.totalFees,
rateUsed: tx.rateUsed,
reason: tx.reason,
date: new Date().toLocaleString(),
scheduled: true,
status: "executed"
});

/* ===== Notifications ===== */

await push(ref(db,"notifications/"+tx.to),{
title:"💰 Argent reçu (programmé)",
phone:tx.from,
amount:tx.amountConverted,
date:new Date().toLocaleString(),
claimable:false
});

await push(ref(db,"notifications/"+tx.from),{
title:"📤 Argent envoyé (programmé)",
phone:tx.to,
amount:tx.amountOriginal,
date:new Date().toLocaleString(),
claimable:true,
txId:historyRef.key
});

/* ===== Marquer exécuté ===== */

await update(ref(db,"scheduledTransfers/"+id),{
executed:true,
executedAt:Date.now()
});

}

}

window.sendClaim = async function(txId){

const claimsRef = ref(db,"serviceClaims");
const claimsSnap = await get(claimsRef);

/* 🔥 ANTI DOUBLE */
if(claimsSnap.exists()){
let exists = false;

Object.values(claimsSnap.val()).forEach(c=>{
if(c.txId === txId && c.user === currentUser.phone && c.status !== "resolved"){
exists = true;
}
});

if(exists){
alert("⚠ Réclamation déjà envoyée !");
return;
}
}

/* 🔍 récupérer transaction */
const historyRef = ref(db,"history/"+currentUser.phone);
const snap = await get(historyRef);

if(!snap.exists()){
alert("Transaction introuvable");
return;
}

let tx = null;

Object.entries(snap.val()).forEach(([id,data])=>{
if(id === txId){
tx = data;
}
});

if(!tx){
alert("Transaction introuvable");
return;
}

/* 🔒 GELER L’ARGENT CHEZ LE DESTINATAIRE */
const receiverSnap = await get(ref(db,"users/"+tx.to));

if(receiverSnap.exists()){
let receiver = receiverSnap.val();

/* initialiser si vide */
if(!receiver.frozenBalance){
receiver.frozenBalance = 0;
}

/* =========================
🔒 GEL MULTI-DEVISE
========================= */

/*
🔥 on bloque uniquement
le montant réellement reçu
par le destinataire
*/

receiver.frozenBalance +=
Number(tx.amountConverted || 0);

/* sauvegarde */
await update(ref(db,"users/"+tx.to),{
frozenBalance: receiver.frozenBalance
});
}

/* =========================
🤖 IA ANTI FAUSSE RÉCLAMATION
========================= */

let riskScore = 0;

/* 🔥 1. fréquence utilisateur */
const claimsSnap2 = await get(ref(db,"serviceClaims"));

if(claimsSnap2.exists()){
const allClaims = Object.values(claimsSnap2.val());

const userClaims = allClaims.filter(c => c.user === currentUser.phone);

if(userClaims.length >= 3){
riskScore += 2;
}
}

/* 🔥 2. montant élevé */
if(tx.amountOriginal >= 50000){
riskScore += 2;
}

/* 🔥 3. réclamation trop rapide */
const now = Date.now();
const txTime = new Date(tx.date).getTime();

if(!isNaN(txTime)){
const diff = now - txTime;

if(diff < 2 * 60 * 1000){ // moins de 2 minutes
riskScore += 3;
}
}

/* 🔥 4. même destinataire répété */
if(claimsSnap2.exists()){
const repeated = Object.values(claimsSnap2.val())
.filter(c => c.to === tx.to && c.user === currentUser.phone);

if(repeated.length >= 2){
riskScore += 2;
}
}

/* 🔥 CLASSIFICATION */
let riskLevel = "normal";

if(riskScore >= 5){
riskLevel = "high_risk";
}
else if(riskScore >= 3){
riskLevel = "medium_risk";
}

/* 🔥 envoi */
await push(ref(db,"serviceClaims"),{
txId: txId,
user: currentUser.phone,
from: tx.from,
to: tx.to,
amount: tx.amountOriginal,
date: tx.date,
status:"pending",

/* 🤖 IA */
risk: riskLevel,
score: riskScore,

createdAt: Date.now()
});

alert("✅ Réclamation envoyée");
};

window.changePassword = async function(){

const oldPass = document.getElementById("oldPass").value;
const newPass = document.getElementById("newPass").value;
const msg = document.getElementById("passMsg");

if(!oldPass || !newPass){
msg.innerText = "❌ Remplis tous les champs";
return;
}

const snap = await get(ref(db,"users/"+currentUser.phone));

if(!snap.exists()){
msg.innerText = "❌ Utilisateur introuvable";
return;
}

const user = snap.val();

if(user.password !== oldPass){
msg.innerText = "❌ Ancien mot de passe incorrect";
return;
}

/* 🔥 update Firebase */
await update(ref(db,"users/"+currentUser.phone),{
password: newPass
});

msg.innerText = "✅ Mot de passe modifié avec succès";
};

const userMenu = document.getElementById("userMenu");

window.toggleMenu = (e) => {
e.stopPropagation();

const modal = document.getElementById("modal");

/* bloque si modal ouvert */
if(!modal.classList.contains("hidden")) return;

userMenu.classList.toggle("hidden");
};

window.changePhoto = () => {
const input = document.createElement("input");
input.type = "file";
input.accept = "image/*";

input.onchange = async (e) => {
const file = e.target.files[0];
if(!file) return;

try {
const storageRef = sRef(storage, "users/" + currentUser.phone + "_profile.jpg");

await uploadBytes(storageRef, file);

const url = await getDownloadURL(storageRef);

// 🔥 FIREBASE DATABASE
await update(ref(db, "users/" + currentUser.phone), {
photo: url
});

// 🔥 LOCAL STORAGE (MANQUAIT !!!)
currentUser.photo = url;
localStorage.setItem("loggedUser", JSON.stringify(currentUser));

// 🔥 UI UPDATE
profilePic.src = url;
menuProfilePic.src = url;

alert("✅ Photo mise à jour");

} catch(e) {
alert("❌ " + e.message);
}
};

input.click();
};

document.getElementById("closeBtn").addEventListener("click", closeModal);

window.openModal = async function(contentId){

console.log("Ouverture :", contentId);

const modal = document.getElementById("modal");
const modalBody = document.getElementById("modalBody");
const content = document.getElementById(contentId);

if(!content){
console.error("❌ Introuvable :", contentId);
return;
}

/* 🔥 déplacer contenu */
modalBody.innerHTML = "";
modalBody.appendChild(content);
content.style.display = "block";
modal.classList.remove("hidden");

/* =========================
   🔔 NOTIFICATIONS
========================= */
if(contentId === "notifBox"){
const snap = await get(ref(db,"notifications/"+currentUser.phone));

if(snap.exists()){
Object.entries(snap.val()).forEach(([id,n])=>{
if(!n.seen){
update(ref(db,"notifications/"+currentUser.phone+"/"+id),{
seen:true
});
}
});
}

setTimeout(loadNotifications,300);
}

/* =========================
   📱 CONTACTS INTELLIGENTS
========================= */
if(contentId === "transferBox"){

const searchInput = content.querySelector("#contactSearch");
const receiver = content.querySelector("#receiver");
const contactsBox = content.querySelector("#contactsList");
const receiverName = content.querySelector("#receiverName");
const amountInputModal = content.querySelector("#amount");
const conversionBoxModal = content.querySelector("#conversionBox");

/* 🔥 ouverture contacts */
receiver.onfocus = ()=>{
contactsBox.innerHTML = "";

allUsers.forEach(user=>{
if(user.phone === currentUser.phone) return;

const country = getCountry(user.phone);
const photo = user.photo ? user.photo : "";

contactsBox.innerHTML += `
<div class="contact-item" data-phone="${user.phone}" data-name="${user.name}">

<div class="contact-avatar">
${photo
? `<img src="${photo}">`
: user.name.charAt(0)}
</div>

<div class="contact-info">
<div class="contact-name">${user.name} ${country.flag}</div>
<div class="contact-phone">${user.phone}</div>
</div>

</div>
`;
});

contactsBox.classList.remove("hidden");
searchInput.classList.remove("hidden"); // 🔥 IMPORTANT
};

searchInput.oninput = ()=>{
const value = searchInput.value.toLowerCase();

const items = contactsBox.querySelectorAll(".contact-item");

items.forEach(item=>{
const name = item.dataset.name.toLowerCase();
const phone = item.dataset.phone;

if(name.includes(value) || phone.includes(value)){
item.style.display = "flex";
}else{
item.style.display = "none";
}
});
};

/* 🔥 clic contact */
contactsBox.onclick = (e)=>{

const item = e.target.closest(".contact-item");
if(!item) return;

const phone = item.dataset.phone;
const name = item.dataset.name;

const selectedBox = content.querySelector("#selectedContact");

selectedBox.innerHTML = `
<div class="contact-avatar">${name.charAt(0)}</div>
<div>
<strong>${name}</strong><br>
${phone}
</div>
`;

selectedBox.classList.remove("hidden");

receiver.value = phone;
receiverName.innerText = "👤 " + name;

/* 🔥 IMPORTANT : MASQUER LISTE + RECHERCHE */
contactsBox.classList.add("hidden");
searchInput.classList.add("hidden");

/* 🔥 conversion */
updateConversion();
};

/* 🔥 auto-détection */
receiver.addEventListener("input", ()=>{
const phone = normalizePhone(receiver.value);

const found = allUsers.find(u => u.phone === phone);

if(found){
receiverName.innerText = "👤 " + found.name;
}else{
receiverName.innerText = "❌ Utilisateur inconnu";
}

/* 🔥 conversion live */
updateConversion();
});

/* 🔥 fermer liste */
document.addEventListener("click", (e)=>{
if(!contactsBox.contains(e.target) && e.target !== receiver){
contactsBox.classList.add("hidden");
}
});

}

};

function closeModal(){

const modal = document.getElementById("modal");
const modalBody = document.getElementById("modalBody");
const hiddenZone = document.getElementById("hiddenZone");

/* 🔥 remettre les éléments à leur place */
while(modalBody.firstChild){
hiddenZone.appendChild(modalBody.firstChild);
}

modal.classList.add("hidden");
}

function listenHistory(){
const historyRef = ref(db,"history/"+currentUser.phone);

onValue(historyRef,(snap)=>{

const historyList = document.getElementById("historyList");
historyList.innerHTML = "";

if(!snap.exists()) return;

Object.entries(snap.val())
.reverse()
.slice(0,5)
.forEach(([id,tx],index)=>{

/* 🔥 VARIABLES */
let icon = "⬇";
let sign = "+";
let color = "#00c853";

/* 🔥 LOGIQUE */
if(tx.type === "withdraw"){
icon = "⬆";
sign = "-";
color = "#ff1744";
}
else if(tx.type === "deposit"){
icon = "⬇";
sign = "+";
color = "#00c853";
}
else if(tx.from === currentUser.phone){
icon = "⬆";
sign = "-";
color = "#ff1744";
}

/* 🔥 DATA SAFE */
const amount = tx.amountOriginal || tx.amountConverted || tx.amount || 0;
const phone = tx.from === currentUser.phone ? tx.to : tx.from;
const date = tx.date || "Date inconnue";

/* 🔥 animation */
const isNew = index === 0;

/* 🔥 AFFICHAGE */
historyList.innerHTML += `
<div class="history-item ${isNew ? 'new-tx' : ''}">
<div style="display:flex;justify-content:space-between;align-items:center;">
<span style="font-weight:bold;color:${color};font-size:16px;">
${icon} ${sign}${formatMoney(amount)}
</span>

<div style="display:flex;gap:8px;align-items:center;">
<span style="font-size:12px;color:gray;">
${date}
</span>

<button onclick="deleteHistory('${id}')"
style="background:red;color:white;border:none;border-radius:6px;padding:2px 6px;font-size:11px;">
X
</button>
</div>

</div>

<div style="font-size:13px;color:#333;">
📱 ${phone || "Inconnu"}
</div>

</div>
`;

});

});
}
listenHistory();

function listenWithdrawRequests(){

const reqRef = ref(db,"withdrawRequests/"+currentUser.phone);

onValue(reqRef, async (snapshot)=>{

if(!snapshot.exists()) return;

const data = snapshot.val();

for(const id in data){

const req = data[id];

console.log("REQ =", req);

/* 🔥 ignorer si déjà traité */
if(req.status !== "pending") continue;

/* 🔥 bloquer double traitement */
await update(ref(db,"withdrawRequests/"+currentUser.phone+"/"+id),{
status:"processing"
});

/* 🔐 DEMANDE MOT DE PASSE */
const pass = prompt(
`💸 Demande de retrait
Montant : ${req.amount} FCFA
Frais : 0 FCFA
Entrez votre mot de passe`
);

/* ❌ utilisateur annule */
if(!pass){
await update(ref(db,"withdrawRequests/"+currentUser.phone+"/"+id),{
status:"pending"
});
continue;
}

/* 🔍 récupérer user */
const userSnap = await get(ref(db,"users/"+currentUser.phone));

if(!userSnap.exists()){
alert("❌ Utilisateur introuvable");
continue;
}

let user = userSnap.val();

/* ❌ mauvais mot de passe */
if(user.password !== pass){
alert("❌ Mot de passe incorrect");

await update(ref(db,"withdrawRequests/"+currentUser.phone+"/"+id),{
status:"pending"
});

continue;
}

/* ❌ solde insuffisant */
const disponible = user.solde - (user.frozenBalance || 0);

if(disponible < req.amount){
alert("❌ Solde insuffisant (fonds bloqués)");

await update(ref(db,"withdrawRequests/"+currentUser.phone+"/"+id),{
status:"pending"
});

continue;
}

/* ❌ agent manquant */
const agentPhone = req.agent || req.fromAgent;

if(!agentPhone){
alert("❌ Agent introuvable");
continue;
}

/* 🔍 récupérer agent */
const agentRef = ref(db,"agents/"+agentPhone);
const agentSnap = await get(agentRef);

if(!agentSnap.exists()){
alert("❌ Agent inexistant");
continue;
}

let agentData = agentSnap.val();

/* 🔥 conversion propre */
const amount = Number(req.amount);

/* ===== TRANSFERT ===== */
user.solde -= amount;
agentData.solde += amount;

/* ===== UPDATE ===== */
await update(ref(db,"users/"+currentUser.phone),{
...user,
solde:user.solde
});

await update(agentRef,{
...agentData,
solde:agentData.solde
});

/* ===== NOTIFICATIONS ===== */

/* utilisateur */
await push(ref(db,"notifications/"+currentUser.phone),{
title:"💸 Retrait effectué",
phone:agentPhone,
amount:amount,
date:new Date().toLocaleString(),
seen:false
});

/* agent */
await push(ref(db,"notifications/"+req.agent),{
title:"💰 Retrait reçu",
phone:currentUser.phone,
amount:amount,
date:new Date().toLocaleString(),
seen:false
});

/* ===== SUPPRESSION DEMANDE ===== */
await remove(ref(db,"withdrawRequests/"+currentUser.phone+"/"+id));

await push(ref(db,"history/"+currentUser.phone),{
from: currentUser.phone,
to: req.fromAgent,
amountOriginal: req.amount,
date: new Date().toLocaleString(),
type:"withdraw"
});

await push(ref(db,"history/"+agentPhone),{
from: currentUser.phone,
to: agentPhone,
amountOriginal: req.amount,
date: new Date().toLocaleString(),
type:"withdraw"
});

alert("✅ Retrait confirmé");

/* 🔄 refresh UI */
listenBalance();

}

});

}

}
