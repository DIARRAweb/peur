<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Historique — COBRA</title>

<style>
body {
margin:0;
font-family:"Segoe UI",sans-serif;
color:#111;
}

/* 🔥 VIDEO BACKGROUND */
#bg-video {
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(0.75) saturate(1.3);
}

/* 🔥 OVERLAY */
body::before {
content:"";
position:fixed;
inset:0;
background:linear-gradient(135deg, rgba(255,140,0,0.4), rgba(255,60,0,0.3));
z-index:-1;
}

/* HEADER */
header {
text-align:center;
font-size:26px;
padding:20px;
color:#ff9a00;
font-weight:bold;
}

/* CARD */
.card {
max-width:1100px;
margin:20px auto;
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:20px;
backdrop-filter: blur(15px);
box-shadow:0 20px 40px rgba(0,0,0,0.3);
animation:fadeUp 0.5s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* INPUT */
input {
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
}

/* TABLE */
table {
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th {
background:#fff2e0;
color:#ff6a00;
padding:12px;
}

td {
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
}

/* BUTTON */
button {
padding:8px 12px;
border-radius:10px;
border:none;
background:linear-gradient(45deg,#ff9a00,#ff3d00);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover {
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.danger {
background:crimson;
}

/* BADGES */
.badge {
padding:5px 10px;
border-radius:10px;
font-size:12px;
font-weight:bold;
}

.badge-normal {
background:#00c853;
color:white;
}

.badge-claim {
background:crimson;
color:white;
}

.badge-cancel {
background:#64748b;
color:white;
}

.hidden { display:none; }

/* 🔥 ID COURT */
.tx-id {
max-width: 120px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
cursor: pointer;
font-weight: bold;
color: #ff3d00;
transition: 0.2s;
}

.tx-id:hover {
color: #000;
}

/* 🔥 EXPANSION */
.tx-id.expanded {
white-space: normal;
overflow: visible;
}

.arrow {
font-size: 18px;
color: red;
animation: moveArrow 0.8s infinite alternate;
}

@keyframes moveArrow {
0% { transform: translateX(0); }
100% { transform: translateX(8px); }
}

.main-header {
position: sticky;
top: 0;
z-index: 100;
display: flex;
justify-content: space-between;
align-items: center;
padding: 12px 20px;
background: rgba(0,0,0,0.5);
backdrop-filter: blur(12px);
color: white;
}

.logo span {
background: linear-gradient(45deg,#ff9a00,#ff3d00);

background-clip: text;           /* ✅ standard */
-webkit-background-clip: text;   /* ✅ Chrome/Safari */

color: transparent;
font-weight: bold;
}

.header-title {
font-size: 18px;
font-weight: bold;
}

td {
vertical-align: middle;
white-space: nowrap;
}

/* 🔥 HEADER FIXE DANS LA CARD */
.history-header {
position: sticky;
top: 0;
z-index: 5;
background: rgba(255,255,255,0.95);
backdrop-filter: blur(10px);
padding: 10px;
border-bottom: 1px solid #eee;
display: flex;
gap: 10px;
}

/* 🔥 SCROLL UNIQUEMENT HISTORIQUE */
#historyContainer {
max-height: 400px;
overflow-y: auto;
}

/* 🔥 SCROLL STYLE */
#historyContainer::-webkit-scrollbar {
width: 6px;
}

#historyContainer::-webkit-scrollbar-thumb {
background: linear-gradient(#ff9a00,#ff3d00);
border-radius: 10px;
}

.history-header input {
flex: 1;
}

.history-header button {
white-space: nowrap;
}
</style>
</head>

<body>

<video autoplay muted loop id="bg-video">
<source src="bg-admin.mp4">
</video>
<button id="soundToggle" style="
position:fixed;
bottom:20px;
right:20px;
z-index:999;
background:black;
color:white;
border-radius:50%;
width:50px;
height:50px;
font-size:18px;
">🔊</button>

<div class="main-header">
<div class="logo">💎 <span>COBRA</span></div>
<div class="header-title">📜 Historique des transactions</div>
</div>

<div class="card">

<!-- 🔥 HEADER FIXE -->
<div class="history-header">
<input id="searchHistory" placeholder="🔎 Rechercher par ID">
<button onclick="toggleHistory()">👁 Afficher / Masquer historique</button>
</div>

<!-- 🔥 CONTENU SCROLL -->
<div id="historyContainer">
<div id="historyList" class="hidden"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, get, update, remove, onValue, push } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const app = initializeApp({ databaseURL:"https://securite-53ada-default-rtdb.firebaseio.com/" });
const db = getDatabase(app);

const historyList = document.getElementById("historyList");
const searchInput = document.getElementById("searchHistory");

let cachedHistory = {};

let currencyMap = {};

/* =========================
💱 CHARGER DEVISES FIREBASE
========================= */
onValue(ref(db,"currencies"), snap=>{

const data = snap.val() || {};

currencyMap = {};

Object.entries(data).forEach(([prefix,c])=>{

currencyMap[prefix] = {
code: c.code,
symbol: c.symbol
};

});

console.log("💱 Devises chargées :", currencyMap);

/* 🔥 recharge historique automatiquement */
renderHistory();

});

function getCurrency(phone){
for(const p in currencyMap){
if(phone.startsWith(p)){
return currencyMap[p];
}
}

return {
code:"XOF",
symbol:"FCFA"
};
}

window.toggleHistory = ()=> historyList.classList.toggle("hidden");

function generateID(date, amount){
if(!date) return "ID-" + Date.now();

const parts = date.split(" ");
const dmy = parts[0].split("/");

if(dmy.length !== 3) return "ID-" + Date.now();

let day = dmy[0];
let month = dmy[1];
let year = dmy[2];

return `${day}.${month}.${year}.${amount}`;
}

onValue(ref(db,"history"), snap=>{
const raw = snap.val() || {};
let flat = {};

/* 🔥 on parcourt chaque utilisateur */
Object.entries(raw).forEach(([user, txs])=>{

    /* 🔥 on parcourt ses transactions */
    Object.entries(txs).forEach(([id, data])=>{

        flat[id] = {
            ...data,
            _user: user   // 🔥 ON GARDE LE NUMÉRO ICI
        };

    });

});

cachedHistory = flat;
renderHistory();
});

searchInput.addEventListener("input", renderHistory);

async function renderHistory(){
const search = searchInput.value.trim();
let rows = "";

for(const [key,h] of Object.entries(cachedHistory).reverse()){
  if(h._user !== h.from) continue;

let displayID = h.customID;
const amount = h.amountOriginal ?? h.amountConverted ?? 0;
/* 🔥 devise expéditeur */
const senderCurrency =
getCurrency(h.from);

/* 🔥 AUTO CORRECTION ANCIENS ID */
if(!displayID){
displayID = "MLP-" + Date.now() + "-" + Math.random().toString(36).substring(2,6).toUpperCase();

await update(ref(db,"history/"+h._user+"/"+key),{
customID: displayID
});
}


if(search && !displayID.includes(search)) continue;

let badge = `<span class="badge badge-normal">✔ Normal</span>`;
if(h.cancelled) badge = `<span class="badge badge-cancel">↩ Annulée</span>`;
else if(h.claimed) badge = `<span class="badge badge-claim">⚠ Réclamation</span>`;

rows += `
<tr>
<td>
<span class="tx-id" onclick="toggleID(this)">
${displayID}
</span>
</td>
<td>${h.from}</td>
<td><span class="arrow">➜</span></td>
<td>${h.to}</td>
<td>
<b>
${amount.toLocaleString("fr-FR")}
${senderCurrency.symbol}
</b>
</td>
<td>${h.date || "Date inconnue"}</td>
<td>${badge}</td>
<td>
<button onclick="cancelTransaction('${key}','${h._user}')">↩ Annuler</button>
<button onclick="deleteHistory('${key}','${h._user}')">🗑</button>
</td>
</tr>`;
}

historyList.innerHTML = `
<table>
<thead>
<tr>
<th>ID</th><th>Expéditeur</th><th></th><th>Destinataire</th>
<th>Montant</th><th>Date</th><th>Statut</th><th>Actions</th>
</tr>
</thead>
<tbody>${rows || "<tr><td colspan='8'>Aucun résultat</td></tr>"}</tbody>
</table>`;
}

window.deleteHistory = async function(id,user){
await remove(ref(db,"history/"+user+"/"+id));
alert("✅ Supprimé");
};

// ✅ CANCEL + FULL REFUND SAFE
window.cancelTransaction = async function(historyID,user){

const snap = await get(ref(db,"history/"+user+"/"+historyID));
  const h = snap.val();
  if(!h) return alert("❌ Transaction introuvable");
  if(h.cancelled) return alert("⚠ Déjà annulée");

  const senderSnap = await get(ref(db,"users/"+h.from));
  const receiverSnap = await get(ref(db,"users/"+h.to));

  let sender = senderSnap.val();
  let receiver = receiverSnap.val();

  if(!sender || !receiver) return alert("❌ Comptes introuvables");
  const amount = h.amountOriginal ?? h.amountConverted ?? 0;

  if(receiver.solde < amount) return alert("❌ Destinataire ne peut pas rembourser");

  receiver.solde -= amount;
  sender.solde += amount;

  await update(ref(db,"users/"+h.from), sender);
  await update(ref(db,"users/"+h.to), receiver);

  await update(ref(db,"history/"+user+"/"+historyID), {
    cancelled:true,
    claimed:true,
    refundDone:true,
    status:"Annulée"
  });

  await push(ref(db,"notifications/"+h.from), {
    title:"💸 Remboursement reçu",
    phone:h.to,
    amount:amount,
    date:new Date().toLocaleString()
  });

  alert("✅ Transaction annulée & argent remboursé !");
};

window.toggleID = function(el){
el.classList.toggle("expanded");
};

const video = document.getElementById("bg-video");
const btn = document.getElementById("soundToggle");

let soundOn = false;

btn.onclick = ()=>{
soundOn = !soundOn;
video.muted = !soundOn;
btn.innerText = soundOn ? "🔊" : "🔇";
};
</script>
</body>
</html>
